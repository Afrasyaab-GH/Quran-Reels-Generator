name: Build Windows Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Publish a GitHub Release with the installer"
        type: boolean
        default: false

permissions:
  contents: write   # needed to create Releases

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r desktop/requirements-desktop.txt

      - name: Download FFmpeg (for bundling)
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extracted" -Force
          $bin = (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-extracted" -Directory | Select-Object -First 1).FullName + "\bin"
          New-Item -ItemType Directory -Path desktop\ffmpeg -Force | Out-Null
          Copy-Item "$bin\ffmpeg.exe"  desktop\ffmpeg\ -Force
          Copy-Item "$bin\ffprobe.exe" desktop\ffmpeg\ -Force
          Write-Host "FFmpeg staged."

      - name: Generate icon + splash
        shell: pwsh
        run: |
          python desktop\generate_icon.py
          python desktop\generate_splash.py

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller desktop\QuranReels.spec --noconfirm --clean
          if (-not (Test-Path "dist\QuranReels\QuranReels.exe")) { throw "Build failed" }

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" desktop\installer_windows.nsi
          $installer = Get-ChildItem dist\QuranReels-Setup-*.exe | Select-Object -First 1
          if (-not $installer) { throw "Installer not produced" }
          Write-Host "Installer: $($installer.FullName) ($([math]::Round($installer.Length/1MB,1)) MB)"
          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuranReels-Setup-Windows
          path: dist/QuranReels-Setup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable bundle (zip)
        shell: pwsh
        run: |
          Compress-Archive -Path dist\QuranReels\* -DestinationPath dist\QuranReels-Portable-Windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: QuranReels-Portable-Windows
          path: dist/QuranReels-Portable-Windows.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release == true
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/QuranReels-Setup-*.exe
            dist/QuranReels-Portable-Windows.zip
          generate_release_notes: true
          draft: false
